schema: conduction

context: |
  Project: App Versions
  Repo: ConductionNL/app-versions
  Type: Nextcloud App (PHP backend + Vue 2 frontend)
  Description: Install any earlier or newer version of already installed Nextcloud apps
  Key components: App list, Version picker, Installer, Update channel detection
  Database: None — this app has no data storage, only API calls
  Mount path: /var/www/html/custom_apps/app_versions

  Architecture:
    Pattern: Admin utility — no database, no OpenRegister dependency
    Backend: InstallerService queries Nextcloud App Store API + SelectedReleaseInstallerService handles download/install
    Frontend: Vue 2 single-page — app picker → version list → install button
    Data: No persistence — reads from IAppManager and Nextcloud App Store REST API
    Auth: Admin-only — all endpoints check IGroupManager::isAdmin()

  Key APIs used:
    - OCP\App\IAppManager — list installed apps, get app info
    - OCP\Http\Client\IClientService — fetch versions from app store
    - OCP\IConfig — read update channel
    - OCP\ServerVersion — get Nextcloud version for compatibility filtering
    - Nextcloud App Store API: https://apps.nextcloud.com/api/v1/apps/{appId}/releases

  This is a standalone utility app — no sister apps, no OpenRegister, no shared specs needed.

rules:
  proposal:
    - This is an admin-only utility — all features require admin privileges
    - No OpenRegister dependency — this app reads from Nextcloud APIs only
  specs:
    - Use OCP interface names for all Nextcloud integration points
    - Specify Nextcloud version compatibility constraints
  design:
    - No database tables — state comes from IAppManager and app store API
    - Password confirmation required for install actions (PasswordConfirmationRequired attribute)
    - Must handle app store API failures gracefully
  tasks:
    - Test with multiple Nextcloud versions (stable31, stable32)
    - Test rollback scenarios (install older version, verify app still works)
    - Test with apps that have minimum/maximum NC version requirements
